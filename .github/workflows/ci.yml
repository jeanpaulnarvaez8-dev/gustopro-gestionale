name: CI

# Run on every push to main + PRs (futuro). Notifica via GitHub UI se fallisce.
# NB: NON e' la fonte di verita' per il deploy — quello e' fatto dall'auto-deploy
# poll-based sul VPS che gira ogni 5 min. Questa CI e' un early-warning per
# regressioni di build / sintassi prima che l'auto-deploy le proverebbe.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  # ─── Backend: load + smoke tests ────────────────────────────────
  backend:
    name: Backend lint + load
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Backend audit (high+)
        working-directory: backend
        run: npm audit --audit-level=high --production

      - name: Backend syntax + require-chain check
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-used
          DATABASE_URL: postgresql://noop@localhost/noop
        run: |
          # Carica app.js per verificare syntax + tutti i require risolvono
          node -e "require('./src/app'); console.log('app.js loads OK')"
          node -e "require('./src/index')" &
          PID=$!
          sleep 2
          kill $PID 2>/dev/null || true
          echo "✓ index.js loads (server avviato e killed)"

  # ─── Frontend: build + bundle size budget ───────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend audit (high+)
        working-directory: frontend
        run: npm audit --audit-level=high --production

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Bundle size budget check
        working-directory: frontend
        run: |
          # Main bundle deve rimanere sotto 500KB raw, sennò warning
          MAIN=$(ls -1 dist/assets/index-*.js | head -1)
          SIZE_KB=$(stat -c %s "$MAIN" 2>/dev/null || stat -f %z "$MAIN")
          SIZE_KB=$((SIZE_KB / 1024))
          echo "Main bundle: ${SIZE_KB} KB"
          if [ "$SIZE_KB" -gt 500 ]; then
            echo "::warning::Main bundle ${SIZE_KB} KB exceeds 500KB budget"
          fi
          if [ "$SIZE_KB" -gt 800 ]; then
            echo "::error::Main bundle ${SIZE_KB} KB exceeds 800KB hard cap"
            exit 1
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── DB migrations: syntax check ────────────────────────────────
  migrations:
    name: SQL migrations syntax
    runs-on: ubuntu-latest
    timeout-minutes: 3
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 6
    steps:
      - uses: actions/checkout@v4

      - name: Apply schema + migrations in order
        env:
          PGPASSWORD: ci
        run: |
          psql -h localhost -U postgres -d ci -f backend/src/db/schema.sql
          for sql in $(ls migrations/*.sql | sort); do
            echo "→ $sql"
            psql -h localhost -U postgres -d ci -f "$sql" -v ON_ERROR_STOP=1
          done
          echo "✓ schema + 18 migrations applicate senza errori"

  # ─── Security headers smoke (su deploy live, opt-in) ────────────
  security-headers:
    name: Security headers (live)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend, migrations]
    steps:
      - name: Wait 60s for auto-deploy on VPS
        run: sleep 60

      - name: Verify production headers
        run: |
          set -e
          BASE=https://gestione.gustopro.it
          headers=$(curl -sI "$BASE/")
          echo "$headers"
          for h in 'strict-transport-security' 'x-frame-options' 'x-content-type-options' 'content-security-policy'; do
            if ! echo "$headers" | grep -qi "$h"; then
              echo "::error::Missing header: $h"
              exit 1
            fi
          done
          health=$(curl -s "$BASE/health")
          echo "$health" | grep -q '"status":"ok"' || { echo "::error::/health failed"; exit 1; }
          echo "✓ Live headers + /health OK"
