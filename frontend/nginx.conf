server {
    listen 80;
    server_name gestione.gustopro.it;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers (statici servizio nginx) ───────────────────────
    # NB: helmet sul backend Express copre solo /api/*. Qui copriamo gli
    # asset statici e la SPA HTML. Cloudflare non aggiunge HSTS/X-Frame
    # automaticamente in modalita' Flexible.
    server_tokens off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    # CSP intentionally permissive per ora: la SPA usa Tailwind inline + Google
    # Fonts + WebSocket + immagini SVG inline. Stretto in Phase 2 dopo audit
    # delle origini effettivamente caricate.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Health check → backend (per uptime monitor / Cloudflare health)
    location = /health {
        proxy_pass http://backend:3001/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Proxy API → backend container
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header Origin http://gestione.gustopro.it;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy Socket.io → backend container
    location /socket.io/ {
        proxy_pass http://backend:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header Origin http://gestione.gustopro.it;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets — long-lived perche' Vite gli assets sono fingerprinted (hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Ripeti i security header (add_header non eredita in nested location)
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Service Worker NON deve essere cached aggressivamente (deve aggiornarsi)
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/manifest+json image/svg+xml;
    gzip_min_length 1024;
}
